<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.uk/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<head>
    <title>在庫一覧</title>
</head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3 mt-3">
        <h2>在庫一覧</h2>
        <a th:href="@{/stock/new}" class="btn btn-primary">在庫商品新規登録</a>
    </div>
    <!-- フィルター -->
    <form th:action="@{/stock}" method="get" class="d-flex gap-2 mb-3">
        <select name="categoryId" class="form-select form-select-sm w-auto">
            <option value="">カテゴリ : すべて</option>
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}"
                    th:selected="${category.id == selectedCategoryId}">
            </option>
        </select>
        <select name="statusId" class="form-select form-select-sm w-auto">
            <option value="">商品状態: すべて</option>
            <option th:each="status : ${statuses}"
                    th:value="${status.id}"
                    th:text="${status.displayName}"
                    th:selected="${status.id == selectedStatusId}">
            </option>
        </select>
        <button type="submit" class="btn btn-primary btn-sm">絞り込み</button>
    </form>
    <!-- 一覧 -->
    <table class="table table-bordered table-hover">
        <thead class="table-light">
            <tr>
                <th>管理番号</th>
                <th>用具名</th>
                <th>メーカー</th>
                <th>状態</th>
                <th>場所</th>
                <th>購入日</th>
                <th>備考</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="stock : ${stockPage.content}">
                <td th:text="${stock.serialCode}"></td>
                <td th:text="${stock.productName}"></td>
                <td th:text="${stock.manufactureName}"></td>
                <td>
                    <span class="badge rounded-pill"
                          th:classappend=
                                  "${stock.status == '在庫' ? 'text-bg-success' :
                                  (stock.status == '貸出中' ? 'text-bg-warning' :
                                  (stock.status == '清掃中' ? 'text-bg-info' : 'text-bg-danger'))}"
                          th:text="${stock.status}">
                    </span>
                </td>
                <td th:text="${stock.location}"></td>
                <td th:text="${stock.purchasedAt}"></td>
                <td th:text="${stock.notes}"></td>
                <td>
                    <span class="d-flex gap-2">
                        <a th:href="@{/stock/{id}/edit(id=${stock.id})}" class="btn btn-sm btn-primary">編集</a>
                        <form th:action="@{/stock/{id}/delete(id=${stock.id})}" method="post">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('削除してもよろしいですか？')">削除</button>
                        </form>
                    </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(stockPage.content)}">
                <td colspan="8" class="text-center text-muted">データがありません</td>
            </tr>
        </tbody>
    </table>
    <!-- ページネーション -->
    <nav>
        <ul class="pagination justify-content-center mt-3">
            <li class="page-item" th:classappend="${stockPage.first} ? 'disabled'">
                <a class="page-link"
                    th:href="@{/stock(page=${stockPage.number - 1},
                    categoryId=${selectedCategoryId}, statusId=${selectedStatusId})}">
                    前へ
                </a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, stockPage.totalPages - 1)}"
                th:classappend="${i == stockPage.number} ? 'active'">
                <a class="page-link"
                    th:href="@{/stock(page=${i},
                    categoryId=${selectedCategoryId}, statusId=${selectedStatusId})}"
                    th:text="${i + 1}">
                </a>
            </li>
            <li class="page-item" th:classappend="${stockPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/stock(page=${stockPage.number + 1},
                    categoryId=${selectedCategoryId}, statusId=${selectedStatusId})}">
                    次へ
                </a>
            </li>
        </ul>
    </nav>
</section>
</body>
</html>
